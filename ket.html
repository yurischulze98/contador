<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dias sem a Ket faltar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; } body { min-height: 100vh; background: linear-gradient(135deg, #f4f6f8, #dfe6ee); color: #1f1f1f; } .header { width: 100%; background: #ffffff; box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08); padding: 18px 30px; } .header nav { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: center; gap: 18px; flex-wrap: wrap; } .header a { text-decoration: none; color: #333; font-size: 1rem; font-weight: bold; padding: 10px 18px; border-radius: 10px; transition: 0.2s ease; } .header a:hover { background: #eef3f8; } .header a.ativo { background: #0d6efd; color: #fff; } .pagina { min-height: calc(100vh - 90px); display: flex; align-items: center; justify-content: center; padding: 30px 20px; } .container { width: 100%; max-width: 900px; background: #ffffff; border-radius: 24px; box-shadow: 0 12px 35px rgba(0, 0, 0, 0.12); padding: 60px 30px; text-align: center; } h1 { font-size: 3.5rem; color: #1f1f1f; margin-bottom: 35px; } .contador { font-size: 7rem; font-weight: bold; color: #0d6efd; line-height: 1; margin-bottom: 15px; } .dias { font-size: 2rem; color: #555; margin-bottom: 40px; } .botoes { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; } button { border: none; padding: 16px 32px; font-size: 1.1rem; border-radius: 12px; cursor: pointer; transition: 0.2s ease; font-weight: bold; } .btn-adicionar { background-color: #198754; color: #fff; } .btn-adicionar:hover { background-color: #157347; transform: scale(1.05); } .btn-reiniciar { background-color: #dc3545; color: #fff; } .btn-reiniciar:hover { background-color: #bb2d3b; transform: scale(1.05); } @media (max-width: 768px) { .header nav { gap: 10px; } .header a { font-size: 0.95rem; padding: 8px 14px; } h1 { font-size: 2.2rem; } .contador { font-size: 4.8rem; } .dias { font-size: 1.4rem; } .botoes { flex-direction: column; } button { width: 100%; } }
    </style>
</head>

<body>
    <header class="header">
        <nav> 
            <a href="index.html">Requisicoes</a> 
            <a href="bea.html">Bea</a>
            <a href="ket.html" class="ativo">Ket</a>
            <a href="teteu.html">Teteu</a>  
            <a href="yuri.html">Yuri</a> 
        </nav>
    </header>
    <main class="pagina">
        <div class="container">
            <h1>Dias sem a Ket faltar</h1>
            <div class="contador" id="contador">0</div>
            <div class="dias">dias</div>
            <div class="botoes">
                <button class="btn-adicionar" id="btnAdicionar" type="button">Adicionar +1 dia</button>
                <button class="btn-reiniciar" id="btnReiniciar" type="button">Reiniciar</button>
            </div>
        </div>
    </main>
    <script>
        const STORAGE_KEY = "diasSemTeteuFaltar"; function hojeSemHora() { const hoje = new Date(); hoje.setHours(0, 0, 0, 0); return hoje; } function diferencaEmDias(dataInicial, dataFinal) { const umDia = 1000 * 60 * 60 * 24; return Math.floor((dataFinal - dataInicial) / umDia); } function obterDados() { const dadosSalvos = localStorage.getItem(STORAGE_KEY); if (!dadosSalvos) { const dadosIniciais = { baseDias: 0, dataBase: hojeSemHora().toISOString() }; localStorage.setItem(STORAGE_KEY, JSON.stringify(dadosIniciais)); return dadosIniciais; } return JSON.parse(dadosSalvos); } function calcularTotalDias() { const dados = obterDados(); const dataBase = new Date(dados.dataBase); const hoje = hojeSemHora(); const diasPassados = diferencaEmDias(dataBase, hoje); return dados.baseDias + diasPassados; } function atualizarContador() { const contador = document.getElementById("contador"); contador.textContent = calcularTotalDias(); } function adicionarDia() { const dados = obterDados(); dados.baseDias = dados.baseDias + 1; localStorage.setItem(STORAGE_KEY, JSON.stringify(dados)); atualizarContador(); } function reiniciarContador() { const confirmar = confirm("Deseja realmente reiniciar o contador?"); if (!confirmar) { return; } const novosDados = { baseDias: 0, dataBase: hojeSemHora().toISOString() }; localStorage.setItem(STORAGE_KEY, JSON.stringify(novosDados)); atualizarContador(); } document.getElementById("btnAdicionar").addEventListener("click", adicionarDia); document.getElementById("btnReiniciar").addEventListener("click", reiniciarContador); atualizarContador();
    </script>
</body>

</html>
