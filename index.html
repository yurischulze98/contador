<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Equipe de Requisição</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f4f6f8, #dfe6ee);
      color: #1f1f1f;
    }

    .header {
      width: 100%;
      background: #ffffff;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      padding: 18px 30px;
    }

    .header nav {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .header a {
      text-decoration: none;
      color: #333;
      font-size: 1rem;
      font-weight: bold;
      padding: 10px 18px;
      border-radius: 10px;
      transition: 0.2s ease;
    }

    .header a:hover {
      background: #eef3f8;
    }

    .header a.ativo {
      background: #0d6efd;
      color: #fff;
    }

    .pagina {
      min-height: calc(100vh - 90px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.12);
      padding: 80px 30px;
      text-align: center;
    }

    h1 {
      font-size: 3.5rem;
      color: #1f1f1f;
      line-height: 1.2;
    }

    @media (max-width: 768px) {
      .header nav {
        gap: 10px;
      }

      .header a {
        font-size: 0.95rem;
        padding: 8px 14px;
      }

      .container {
        padding: 60px 20px;
      }

      h1 {
        font-size: 2.2rem;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <nav>
      <a href="index.html" class="ativo">Requisições</a>
      <a href="">Bea</a>
      <a href="#">Teteu</a>
      <a href="#">Ket</a>
      <a href="#">Yuri</a>
    </nav>
  </header>

  <main class="pagina">
    <div class="container">
      <h1>Equipe de Requisição</h1>
    </div>
  </main>
</body>
</html>
